name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-pc:
    name: Build PC installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bus2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: bus2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" --prefix cloud

      - name: Build PC release
        run: npm run build:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_CLOUD_URL: ${{ secrets.ADKERALA_CLOUD_URL }}

      - name: Upload PC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pc-release
          path: |
            bus2/release/*.exe
            bus2/release/latest.yml

  publish:
    name: GitHub Release + cloud register
    needs: [build-pc]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download PC artifacts
        uses: actions/download-artifact@v4
        with:
          name: pc-release
          path: artifacts/pc

      - name: Prepare release files
        run: |
          mkdir -p release-upload
          cp artifacts/pc/*.exe release-upload/ 2>/dev/null || true
          cp artifacts/pc/latest.yml release-upload/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-upload/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Register releases on cloud admin
        working-directory: bus2
        env:
          # Force the raw Railway URL for this server-to-server call, not the
          # ADKERALA_CLOUD_URL secret (adkerala.com) — that domain sits behind
          # Cloudflare, which challenges/blocks non-browser clients like this
          # (confirmed via .github/workflows/diagnose-cloud-auth.yml: identical
          # request gets a clean 401 via Railway's raw URL but a Cloudflare
          # challenge page via the custom domain). Bus PCs default to the same
          # raw URL for their own API traffic — see kiosk/installEnv.cjs.
          ADKERALA_CLOUD_URL: https://adkeralav1-production.up.railway.app
          ADKERALA_ADMIN_KEY: ${{ secrets.ADKERALA_ADMIN_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$ADKERALA_ADMIN_KEY" ]; then
            echo "Skipping cloud register — add ADKERALA_ADMIN_KEY repo secret"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          PC_FILE=$(ls ../release-upload/*.exe 2>/dev/null | head -1)
          PC_NAME=$(basename "$PC_FILE")
          SHA512=""
          SIZE=""
          if [ -f ../release-upload/latest.yml ]; then
            SHA512=$(grep -E '^sha512:' ../release-upload/latest.yml | head -1 | awk '{print $2}')
            SIZE=$(grep -E 'size:' ../release-upload/latest.yml | head -1 | awk '{print $2}')
          fi
          node scripts/register-release.mjs \
            --cloud-url "$ADKERALA_CLOUD_URL" \
            --admin-key "$ADKERALA_ADMIN_KEY" \
            --version "$VERSION" \
            --pc-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${PC_NAME}" \
            --sha512 "$SHA512" \
            --size "$SIZE"

  deploy-cloud:
    name: Deploy cloud to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync cloud version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
        working-directory: bus2/cloud

      - name: Deploy cloud to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Skipping Railway deploy — add RAILWAY_TOKEN repo secret"
            exit 0
          fi
          npm install -g @railway/cli
          cd bus2/cloud && railway up --service adkeralav1
