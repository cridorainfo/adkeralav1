# Monorepo: cloud admin lives in bus2/cloud. Railway reads this file from the repo root.
# Build context = repo root → use /Dockerfile (paths prefixed with bus2/cloud/).
# Alternative: set Railway Root Directory to bus2/cloud and use bus2/cloud/Dockerfile.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["bus2/cloud/**"]

# Build-time: bake primary cloud URL into the React portal.
[build.args]
VITE_CLOUD_URL = "https://adkeralav1-production.up.railway.app"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
