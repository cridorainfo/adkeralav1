# Used when service Root Directory is set to bus2/cloud in Railway.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

# Build-time: bake primary cloud URL into the React portal (matches ADKERALA_PUBLIC_URL).
[build.args]
VITE_CLOUD_URL = "https://adkeralav1-production.up.railway.app"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"