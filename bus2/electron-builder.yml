appId: com.adkerala.display
productName: AdKeralaDisplay
copyright: Copyright © AdKerala

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - server/**/*
  - kiosk/**/*
  - shared/**/*
  - cloud/shared/hub/**/*
  - src/store/**/*
  - src/lib/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/@vite/**/*"
  - "!node_modules/vite/**/*"
  - "!node_modules/@vitejs/**/*"
  - "!node_modules/electron/**/*"
  - "!node_modules/electron-builder/**/*"
  - "!node_modules/.cache/**/*"
  # Capacitor / Android — driver APK only; not used by bus PC Electron app
  - "!node_modules/@capacitor/**/*"
  - "!node_modules/@capawesome-team/**/*"
  - "!android/**/*"
  - "!node_modules/**/android/**/*"
  - "!node_modules/**/.gradle/**/*"

extraResources:
  - from: portable-template/db
    to: db
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  artifactName: AdKeralaDisplay-${version}.${ext}
  signAndEditExecutable: false
  electronLanguages:
    - en-US
    - ml

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: AdKerala Display
  include: build/installer.nsh

extraFiles:
  - from: scripts/allow-firewall.bat
    to: allow-firewall.bat
  - from: scripts/Install-AdKerala.bat
    to: Install-AdKerala.bat
  - from: scripts/install-portable.ps1
    to: install-portable.ps1
  - from: portable-template/INSTALL.txt
    to: INSTALL.txt

# Was `asar: true` with asarUnpack limited to node_modules/sharp + @img (native binaries that
# can't run from inside an asar archive). Hot patches (see kiosk/hotpatchSupervisor.cjs) need
# one more thing an asar can't provide: a real on-disk node_modules directory to create a
# Windows directory junction to from each patch version's own folder (junctions require a real
# filesystem target — app.getAppPath() resolving to a path *inside* app.asar isn't one). Rather
# than selectively unpack node_modules too, disabling asar outright is simpler and removes an
# entire category of asar-vs-child-process-vs-ESM interaction risk this app has no real need to
# take on — it's an internal fleet kiosk, not a product that benefits from asar's minor
# packaging/obscurity gains.
asar: false

publish:
  provider: generic
  url: https://adkerala.com/api/releases/pc
