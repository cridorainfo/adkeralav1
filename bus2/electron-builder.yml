appId: com.adkerala.display
productName: AdKeralaDisplay
copyright: Copyright © AdKerala

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - server/**/*
  - kiosk/**/*
  - shared/**/*
  - src/store/**/*
  - src/lib/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/@vite/**/*"
  - "!node_modules/vite/**/*"
  - "!node_modules/@vitejs/**/*"
  - "!node_modules/electron/**/*"
  - "!node_modules/electron-builder/**/*"
  - "!node_modules/.cache/**/*"

extraResources:
  - from: db
    to: db
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  artifactName: AdKeralaDisplay-${version}.${ext}
  signAndEditExecutable: false
  electronLanguages:
    - en-US
    - ml

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: AdKerala Display
  include: build/installer.nsh

extraFiles:
  - from: scripts/allow-firewall.bat
    to: allow-firewall.bat
  - from: scripts/Install-AdKerala.bat
    to: Install-AdKerala.bat
  - from: scripts/install-portable.ps1
    to: install-portable.ps1

asar: true

publish:
  provider: generic
  url: https://example.com/api/releases/pc
