appId: com.adkerala.display
productName: AdKeralaDisplay
copyright: Copyright © AdKerala

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - server/**/*
  - kiosk/**/*
  - src/store/**/*
  - src/lib/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/@vite/**/*"
  - "!node_modules/vite/**/*"
  - "!node_modules/@vitejs/**/*"
  - "!node_modules/electron/**/*"
  - "!node_modules/electron-builder/**/*"
  - "!node_modules/.cache/**/*"

extraResources:
  - from: db
    to: db
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  artifactName: AdKeralaDisplay-${version}.${ext}
  signAndEditExecutable: false

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

extraFiles:
  - from: scripts/allow-firewall.bat
    to: allow-firewall.bat

asar: true

publish:
  provider: generic
  url: https://example.com/api/releases/pc
